spring.application.name=restaurant-roulette
server.address=${RANDISH_SERVER_ADDRESS:127.0.0.1}
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/randish;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.sql.init.mode=always
spring.h2.console.enabled=${RANDISH_H2_CONSOLE_ENABLED:false}

randish.debug.enabled=${RANDISH_DEBUG_ENABLED:false}
randish.cors.allowed-origins=${RANDISH_CORS_ALLOWED_ORIGINS:http://localhost:19006,http://127.0.0.1:19006,http://localhost:8081,http://127.0.0.1:8081,http://localhost:8082,http://127.0.0.1:8082,http://localhost:3000,http://127.0.0.1:3000}
randish.rate-limit.enabled=${RANDISH_RATE_LIMIT_ENABLED:true}
randish.rate-limit.api-per-minute=${RANDISH_RATE_LIMIT_API_PER_MINUTE:180}
randish.rate-limit.auth-per-minute=${RANDISH_RATE_LIMIT_AUTH_PER_MINUTE:20}
randish.rate-limit.photo-per-minute=${RANDISH_RATE_LIMIT_PHOTO_PER_MINUTE:60}
